# Inkwell — operator stack from published GHCR images (no source build).
# Setup, env vars, INKWELL_VERSION, updating, ports, and backups: see
# SELF_HOSTING.md ("Run from published images"). Save this as
# docker-compose.yml in a clean dir so commands are a bare `docker compose …`.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storyeditor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-storyeditor}
      POSTGRES_DB: ${POSTGRES_DB:-storyeditor}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-storyeditor} -d ${POSTGRES_DB:-storyeditor}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/doctorkomodo/inkwell-backend:${INKWELL_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Default resolves postgres over the compose network and tracks POSTGRES_*.
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-storyeditor}:${POSTGRES_PASSWORD:-storyeditor}@postgres:5432/${POSTGRES_DB:-storyeditor}}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  frontend:
    image: ghcr.io/doctorkomodo/inkwell-frontend:${INKWELL_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pgdata:
