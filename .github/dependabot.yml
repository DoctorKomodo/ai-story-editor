# Dependabot keeps the three npm workspaces (root / backend / frontend)
# fresh on a weekly cadence. Every update opens a PR that runs through the
# same CI gates as any other change (Biome + tsc + vitest + postgres +
# gitleaks), so merging an update is just "CI green → merge."
#
# Grouping: patch + minor updates go in one PR per workspace per ecosystem
# so we don't get 20 open PRs every Monday. Majors stay separate because
# they frequently break and need individual review.
#
# GitHub Actions workflows also get scanned so action pins stay current.

version: 2

updates:
  # ── npm: root workspace ────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      root-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ── npm: backend ───────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ── npm: frontend ──────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 3
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
