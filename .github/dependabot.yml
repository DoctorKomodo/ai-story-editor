# Dependabot keeps the npm workspace tree (root / backend / frontend / shared)
# fresh on a weekly cadence. Every update opens a PR that runs through the
# same CI gates as any other change (Biome + tsc + vitest + postgres +
# gitleaks), so merging an update is just "CI green → merge."
#
# Post-workspaces: a single npm entry at `/` is correct. Dependabot reads the
# root package.json's `workspaces` field, walks every workspace's manifest,
# and figures out which workspace's package.json a given dep belongs to. The
# single root package-lock.json is the authoritative lockfile — there are no
# per-subdir lockfiles anymore.
#
# Grouping: patch + minor updates go in one PR per ecosystem so we don't get
# 20 open PRs every Monday. Majors stay separate because they frequently
# break and need individual review.
#
# GitHub Actions workflows also get scanned so action pins stay current.

version: 2

updates:
  # ── npm: workspace root (covers backend, frontend, shared) ─────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 3
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
