name: Release

# Cut a release by pushing a semver tag:
#   scripts/release.sh 0.2.0 && git push origin main --follow-tags
# The three-part `v*.*.*` shape is required so docker/metadata-action's
# `type=semver` patterns resolve (and don't silently no-op).
on:
  push:
    tags:
      - 'v*.*.*'

# contents: write -> create the GitHub Release (+ read the tag).
# packages: write -> push images to GHCR. The repo default token may be
# read-only depending on settings, so declare both explicitly.
permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/doctorkomodo/inkwell-backend
  FRONTEND_IMAGE: ghcr.io/doctorkomodo/inkwell-frontend

jobs:
  release:
    name: build · push · release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # Strip the leading "v" for the frontend build-arg / run summary.
      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend image ──────────────────────────────────────────────────────
      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.BACKEND_IMAGE }}
          # v0.2.0 -> 0.2.0, 0.2, latest. metadata-action also emits the
          # org.opencontainers.image.* labels (source/revision/version) that
          # link the GHCR package back to this repo.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          target: runner
          platforms: linux/amd64
          push: true
          # Keep the artifact a plain single-arch manifest — SLSA provenance
          # turns it into an index that confuses GHCR's UI and some pull paths
          # for a single-arch self-hosted image.
          provenance: false
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      # ── Frontend image ─────────────────────────────────────────────────────
      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: frontend/Dockerfile
          target: runner
          platforms: linux/amd64
          push: true
          provenance: false
          # Bake the clean semver into the SPA so the Settings footer shows the
          # official version (non-release builds default to dev / dev-<sha>).
          build-args: |
            VITE_APP_VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

      # ── GitHub Release ─────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Auto-generate notes from merged PRs / commits since the previous tag.
          generate_release_notes: true
