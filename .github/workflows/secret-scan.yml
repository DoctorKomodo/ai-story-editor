name: Secret scan

on:
  push:
    branches: [main]
  pull_request:

# Secrets get introduced at push time, not merge time — scanning `main` after
# the fact is too late. Gitleaks runs on every push and every PR so a key
# lands in history only if it survives both gates.
#
# Threat model for this repo: BYOK Venice keys, APP_ENCRYPTION_KEY, JWT
# secrets, refresh-token secrets, recovery codes. None are allowed in git
# history. Default gitleaks rules catch AWS/GCP/GitHub PATs, generic API key
# patterns, and high-entropy strings; rules.toml below adds a Venice-key
# shape matcher (Venice keys start with `veniceai-`) so we catch them even
# if they slip past the generic rules.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt every JS action in this workflow into the Node 24 runtime ahead of
# GitHub's forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history — we want to scan every commit on push, not just the
          # tip. `fetch-depth: 0` is required for the default gitleaks scan
          # mode (`detect` across history).
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For private repos, set a GITLEAKS_LICENSE secret at the repo level
          # (https://gitleaks.io/products.html). Public repos don't need one.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
