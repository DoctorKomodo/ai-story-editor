name: E2E (Playwright)

# Brings up the full docker-compose stack (postgres + backend + frontend),
# waits for healthchecks, and runs the Playwright suite under tests/e2e/
# against the running app. T8 / T8.1 shipped real coverage (full-flow +
# smoke specs) — see docs/done/done-T.md.
#
# This workflow currently runs on manual trigger (workflow_dispatch) only.
# Whether it should also gate PRs (done-T.md and playwright.config.ts both
# describe T8 as "tier-2 PR-blocking") is an open CI-policy decision tracked
# in story-editor-7ns — do not flip the triggers without resolving that.

on:
  workflow_dispatch:
  # PR/push triggers intentionally left off pending story-editor-7ns:
  # push:
  #   branches: [main]
  # pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt every JS action in this workflow into the Node 24 runtime ahead of
# GitHub's forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    name: playwright
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write .env for compose
        run: |
          # Minimal env for the compose stack to boot. All values here are
          # CI-only; real deploys use a separate .env managed by the operator.
          cat > .env <<'ENV'
          DATABASE_URL=postgresql://storyeditor:storyeditor@postgres:5432/storyeditor
          POSTGRES_USER=storyeditor
          POSTGRES_PASSWORD=storyeditor
          POSTGRES_DB=storyeditor
          JWT_SECRET=ci-jwt-secret-do-not-use-in-production
          REFRESH_TOKEN_SECRET=ci-refresh-secret-do-not-use-in-production
          FRONTEND_URL=http://localhost:3000
          PORT=4000
          ENV

      - name: Bring up compose stack
        run: |
          docker compose up -d --wait
          docker compose ps

      - name: Apply Prisma migrations
        run: docker compose exec -T backend npx prisma migrate deploy

      - name: Run Playwright
        run: npx playwright test --reporter=line

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Tear down compose
        if: always()
        run: docker compose down -v
