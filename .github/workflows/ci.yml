name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel stale runs when a new push lands on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt every JS action in this workflow into the Node 24 runtime ahead of
# GitHub's forced cutover. Without this, checkout@v4 / setup-node@v4 still
# boot on Node 20 and emit deprecation warnings on every run.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: lint · typecheck · test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: storyeditor
          POSTGRES_PASSWORD: storyeditor
          POSTGRES_DB: storyeditor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U storyeditor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Backend test env. These values match .env.test; CI owns its own DB
      # lifecycle (prisma migrate deploy below), so no docker compose needed.
      # APP_ENCRYPTION_KEY is auto-synthesised by backend/tests/setup.ts when
      # absent, so we don't set it here.
      DATABASE_URL: postgresql://storyeditor:storyeditor@localhost:5432/storyeditor_test
      JWT_SECRET: ci-jwt-secret-do-not-use-in-production
      REFRESH_TOKEN_SECRET: ci-refresh-secret-do-not-use-in-production
      FRONTEND_URL: http://localhost:3000
      PORT: 4001
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # ── Lint ───────────────────────────────────────────────────────────────
      - name: Biome (lint + format check)
        run: npx biome ci .

      # Prisma 7 ships an empty client until `prisma generate` runs against
      # the schema; without this the backend typecheck fails on every file
      # that imports from @prisma/client.
      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate

      # ── Typecheck ──────────────────────────────────────────────────────────
      - name: Backend typecheck
        working-directory: backend
        run: npx tsc --noEmit

      - name: Frontend typecheck
        working-directory: frontend
        run: npx tsc -b

      # ── Design-token drift check ───────────────────────────────────────────
      # See MIGRATION.md and frontend/scripts/lint-design.mjs. Catches raw
      # Tailwind palette colors, hex literals, mid-tier shadows, and
      # focus-rings that bypass the design-token system.
      - name: Frontend design-token lint
        working-directory: frontend
        run: npm run lint:design

      # ── Production build ───────────────────────────────────────────────────
      # The typechecks above are --noEmit; a real build catches a different
      # class of errors — emit-time issues in the backend, and PostCSS /
      # asset / bundler / Tailwind issues in the frontend. Cheap to run
      # (~2–3s each) and the only gate before a broken build would
      # otherwise surface in prod.
      - name: Backend build
        working-directory: backend
        run: npm run build

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Build Storybook
        working-directory: frontend
        run: npm run build-storybook -- --quiet

      # ── Test ───────────────────────────────────────────────────────────────
      - name: Prisma migrate (test DB)
        working-directory: backend
        run: npx prisma migrate deploy

      # Vitest's JSON reporter emits `numTotalTests`. We assert it > 0 on
      # top of `passWithNoTests: false` in each vitest.config.ts so a
      # collection-time regression (e.g. a missing peer dep making every
      # test file register 0 tests) can't sneak through CI as green.
      - name: Backend tests
        working-directory: backend
        run: npx vitest run --reporter=json --outputFile=vitest-result.json --reporter=default

      - name: Assert backend ran > 0 tests
        working-directory: backend
        run: |
          count=$(jq '.numTotalTests' vitest-result.json)
          echo "backend ran $count tests"
          if [ "$count" -lt 1 ]; then
            echo "::error::Backend suite ran 0 tests — something collected nothing." >&2
            exit 1
          fi

      - name: Frontend tests
        working-directory: frontend
        run: npx vitest run --reporter=json --outputFile=vitest-result.json --reporter=default

      - name: Assert frontend ran > 0 tests
        working-directory: frontend
        run: |
          count=$(jq '.numTotalTests' vitest-result.json)
          echo "frontend ran $count tests"
          if [ "$count" -lt 1 ]; then
            echo "::error::Frontend suite ran 0 tests — something collected nothing." >&2
            exit 1
          fi
