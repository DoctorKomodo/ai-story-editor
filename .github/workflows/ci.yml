name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel stale runs when a new push lands on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt every JS action in this workflow into the Node 24 runtime ahead of
# GitHub's forced cutover. Without this, checkout@v4 / setup-node@v4 still
# boot on Node 20 and emit deprecation warnings on every run.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: lint · typecheck · test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: storyeditor
          POSTGRES_PASSWORD: storyeditor
          POSTGRES_DB: storyeditor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U storyeditor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Backend test env. These values match .env.test; CI owns its own DB
      # lifecycle (prisma migrate deploy below), so no docker compose needed.
      # APP_ENCRYPTION_KEY is auto-synthesised by backend/tests/setup.ts when
      # absent, so we don't set it here.
      DATABASE_URL: postgresql://storyeditor:storyeditor@localhost:5432/storyeditor_test
      JWT_SECRET: ci-jwt-secret-do-not-use-in-production
      REFRESH_TOKEN_SECRET: ci-refresh-secret-do-not-use-in-production
      FRONTEND_URL: http://localhost:3000
      PORT: 4001
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      # ── Lint ───────────────────────────────────────────────────────────────
      - name: Biome (lint + format check)
        run: npx biome ci .

      # Prisma 7 ships an empty client until `prisma generate` runs against
      # the schema; without this the backend typecheck fails on every file
      # that imports from @prisma/client.
      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate

      # ── Typecheck ──────────────────────────────────────────────────────────
      - name: Shared typecheck
        run: npm -w story-editor-shared run typecheck

      - name: Backend typecheck
        run: npm -w story-editor-backend run typecheck

      - name: Frontend typecheck
        run: npm -w story-editor-frontend run typecheck

      # ── Design-token drift check ───────────────────────────────────────────
      # See MIGRATION.md and frontend/scripts/lint-design.mjs. Catches raw
      # Tailwind palette colors, hex literals, mid-tier shadows, and
      # focus-rings that bypass the design-token system.
      - name: Frontend design-token lint
        run: npm -w story-editor-frontend run lint:design

      # ── Production build ───────────────────────────────────────────────────
      # The typechecks above are --noEmit; a real build catches a different
      # class of errors — emit-time issues in the backend, and PostCSS /
      # asset / bundler / Tailwind issues in the frontend. Cheap to run
      # (~2–3s each) and the only gate before a broken build would
      # otherwise surface in prod.
      - name: Backend build
        run: npm -w story-editor-backend run build

      # The backend build is a tsup bundle: story-editor-shared (pure Zod/TS)
      # is inlined, every node_modules dep stays external. Assert both — a
      # regression either way (shared not inlined, or a heavy dep wrongly
      # bundled) is a prod-resolution bug the vitest suites can't catch
      # because they use vitest's own resolver, never the bundle.
      - name: Assert backend bundle inlined shared, kept deps external
        working-directory: backend
        run: |
          if grep -q '"story-editor-shared"' dist/index.js; then
            echo "::error::story-editor-shared was not inlined into the backend bundle" >&2
            exit 1
          fi
          if ! grep -q '"@prisma/client"' dist/index.js; then
            echo "::error::@prisma/client is missing from the bundle externals — it was wrongly bundled" >&2
            exit 1
          fi
          echo "bundle OK: story-editor-shared inlined, @prisma/client external"

      - name: Frontend build
        run: npm -w story-editor-frontend run build

      - name: Build Storybook
        run: npm -w story-editor-frontend run build-storybook -- --quiet

      # ── Test ───────────────────────────────────────────────────────────────
      - name: Shared tests
        run: npm -w story-editor-shared run test

      - name: Prisma migrate (test DB)
        working-directory: backend
        run: npx prisma migrate deploy

      # Boot the actual built artifact (node dist/index.js) against the CI
      # Postgres and hit /api/health. This is the one CI guard that the prod
      # entry path resolves and boots — the vitest suites never touch the
      # bundle. NODE_ENV=production so it boots the way prod does; if
      # backend/src/boot/env-validation.ts requires more env in production
      # mode, add it here (the goal is a representative prod boot).
      - name: Backend boot smoke (built artifact)
        working-directory: backend
        env:
          NODE_ENV: production
        run: |
          # Synthetic all-zero key: env-validation.ts only checks length (32 bytes).
          # Not a real key — the runner is ephemeral and it wraps no real Venice keys.
          export APP_ENCRYPTION_KEY=$(node -p "Buffer.alloc(32, 0).toString('base64')")
          node --enable-source-maps dist/index.js &
          APP_PID=$!
          ok=
          for i in $(seq 1 30); do
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "::error::backend built artifact exited before /api/health became healthy" >&2
              break
            fi
            if wget -qO- http://localhost:4001/api/health 2>/dev/null | grep -q '"status":"ok"'; then
              ok=1; break
            fi
            sleep 1
          done
          kill "$APP_PID" 2>/dev/null || true
          if [ -z "$ok" ]; then
            echo "::error::backend built artifact did not become healthy on :4001" >&2
            exit 1
          fi
          echo "boot smoke OK: built artifact resolved and served /api/health"

      # Vitest's JSON reporter emits `numTotalTests`. We assert it > 0 on
      # top of `passWithNoTests: false` in each vitest.config.ts so a
      # collection-time regression (e.g. a missing peer dep making every
      # test file register 0 tests) can't sneak through CI as green.
      - name: Backend tests
        run: npm -w story-editor-backend run test -- --reporter=json --outputFile=vitest-result.json --reporter=default

      - name: Assert backend ran > 0 tests
        working-directory: backend
        run: |
          count=$(jq '.numTotalTests' vitest-result.json)
          echo "backend ran $count tests"
          if [ "$count" -lt 1 ]; then
            echo "::error::Backend suite ran 0 tests — something collected nothing." >&2
            exit 1
          fi

      - name: Frontend tests
        run: npm -w story-editor-frontend run test -- --reporter=json --outputFile=vitest-result.json --reporter=default

      - name: Assert frontend ran > 0 tests
        working-directory: frontend
        run: |
          count=$(jq '.numTotalTests' vitest-result.json)
          echo "frontend ran $count tests"
          if [ "$count" -lt 1 ]; then
            echo "::error::Frontend suite ran 0 tests — something collected nothing." >&2
            exit 1
          fi
