server {
  listen 3000 default_server;
  listen [::]:3000 default_server;

  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed assets, no-cache the entry HTML so SPA bumps deploy cleanly.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Same-origin reverse proxy to the backend service. Keeps the SPA's
  # `/api/...` calls origin-relative (matches the refresh-cookie's
  # `path=/api/auth` scope) and avoids a CORS preflight on every request.
  # SSE-friendly: buffering off, generous read timeout for /api/ai/* streams.
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }

  location = /index.html {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  # SPA fallback — any unknown route serves index.html so client routing works
  # on direct page load / refresh.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Don't leak nginx version in headers/error pages.
  server_tokens off;
}
