services:
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    restart: unless-stopped
    volumes:
      - frontend_cache:/var/cache/nginx
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: nginx:alpine
    ports:
      - "4000:80"
    restart: unless-stopped
    volumes:
      - backend_cache:/var/cache/nginx
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: storyeditor
      POSTGRES_PASSWORD: storyeditor
      POSTGRES_DB: storyeditor
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyeditor -d storyeditor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  frontend_cache:
  backend_cache:
